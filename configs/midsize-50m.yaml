name: glemton-midsize-50m
# A 50M-parameter test model used to actually see corpus effects vs the
# 12M debug. Not the v1.0 target — sits between debug and the full 350M.
model:
  vocab_size: 32000
  d_model: 512
  n_layers: 12
  n_heads: 8
  n_kv_heads: 2
  ffn_dim: 1376
  max_seq_len: 2048
  rope_theta: 10000.0
  norm_eps: 1.0e-5
  tie_embeddings: true
  attention:
    sliding_window: 2048
    global_every: 6

train:
  batch_size: 32
  micro_batch_size: 4
  grad_accum_steps: 8
  seq_len: 1024
  total_tokens: 200_000_000
  lr: 4.0e-4
  lr_min: 4.0e-5
  warmup_tokens: 5_000_000
  cosine_decay_to: 0.1
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  precision: bf16
  optimizer: adamw
  grad_checkpointing: false
  compile: false
  checkpoint_every_tokens: 50_000_000

data:
  shard_dir: data/tokenized
  shuffle_buffer: 10000
  # Up-sample dialogue sources so they dominate training despite being a
  # small fraction of raw tokens. Common Pile (~94% raw) gets 1.0;
  # Gutenberg dialogue (~2.4%) gets 8x weighting; SQuAD (~3.6%) gets 4x.
  source_weights:
    common_pile: 1.0
    gutenberg_books: 8.0
    squad: 4.0
